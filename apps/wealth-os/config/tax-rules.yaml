# UK tax rules — versioned. Updated each Budget / Finance Act.
# Tax year notation: `2026` = tax year 2026/27 (6 April 2026 – 5 April 2027).
# IMPORTANT: VERIFY EACH ENTRY AGAINST GOV.UK AT RUNTIME. Do not rely on these
# values blindly for live tax-relevant decisions.

version: "2026-05-31"
jurisdiction: GB

# Active = the year we're currently in. Previous years stay in `archive`
# so historic calculations can resolve the right ruleset.
active_tax_year: 2026

tax_year:
  current_starts_on: "2026-04-06"
  current_ends_on:   "2027-04-05"
  number: 2026

isa:
  total_allowance_gbp: 20000
  junior_isa_allowance_gbp: 9000
  lifetime_isa_allowance_gbp: 4000        # counts within £20k total
  lifetime_isa_bonus_pct: 0.25
  lifetime_isa_age_min: 18
  lifetime_isa_age_max_open: 39
  lifetime_isa_age_max_contrib: 49
  flexible_isa_replacements_allowed_same_year: true
  multiple_same_type_isas_allowed: true   # rule change effective 6 April 2024
  lisa_single_subscription_per_year: true # LISA exception to the above
  partial_transfers_current_year_allowed: true
  eligible_investments:
    - uk_listed_shares
    - eea_listed_shares
    - aim_listed_shares
    - oeic_units
    - investment_trusts
    - corporate_bonds_with_remaining_term_gt_5y
    - gilts
    - reits
    - cash
  # From 6 April 2026 cryptoasset ETNs are no longer eligible for new ISA
  # subscriptions. Existing holdings before that date may remain.
  ineligible_examples:
    - unlisted_company_shares
    - direct_property
    - physical_commodities
    - cryptocurrency
    - cryptoasset_etn_new_purchases_from_2026_04_06

income_tax_england_wales_ni:
  personal_allowance_gbp: 12570
  personal_allowance_taper_starts_gbp: 100000
  personal_allowance_fully_lost_at_gbp: 125140
  basic_rate_pct: 0.20
  basic_rate_band_upper_gbp: 50270
  higher_rate_pct: 0.40
  higher_rate_band_upper_gbp: 125140
  additional_rate_pct: 0.45

# Dividend tax rates rose from 6 April 2026.
dividend_tax:
  allowance_gbp: 500
  basic_rate_pct: 0.1075
  higher_rate_pct: 0.3575
  additional_rate_pct: 0.3935

capital_gains_tax:
  annual_exempt_amount_gbp: 3000
  rates:
    basic_taxpayer_other_assets_pct: 0.10
    higher_taxpayer_other_assets_pct: 0.20
    basic_taxpayer_residential_pct: 0.18
    higher_taxpayer_residential_pct: 0.24

national_insurance:
  class_1_primary_threshold_gbp: 12570
  class_1_main_rate_pct: 0.08
  class_1_upper_earnings_limit_gbp: 50270
  class_1_above_uel_pct: 0.02

corporation_tax:
  small_profits_rate_pct: 0.19
  small_profits_threshold_gbp: 50000
  main_rate_pct: 0.25
  main_rate_threshold_gbp: 250000
  marginal_relief_fraction: 0.015

pension:
  annual_allowance_gbp: 60000
  money_purchase_annual_allowance_gbp: 10000
  taper_starts_adjusted_income_gbp: 260000
  taper_floor_annual_allowance_gbp: 10000
  carry_forward_years: 3
  lifetime_allowance_abolished: true        # from 6 April 2024

reminders:
  - id: isa_year_end
    when_relative: "P-30D before 2027-04-05"
    message: "30 days to use this year's ISA allowance."
  - id: isa_two_weeks
    when_relative: "P-14D before 2027-04-05"
    message: "14 days to use this year's ISA allowance."
  - id: self_assessment_paper
    when: "2026-10-31"
    message: "Paper self-assessment deadline."
  - id: self_assessment_online
    when: "2027-01-31"
    message: "Online self-assessment + payment on account deadline."

# Prior tax years kept here so historic ISA deposits / dividends in old data
# resolve against the rules in force at the time.
archive:
  2025:
    tax_year:
      current_starts_on: "2025-04-06"
      current_ends_on:   "2026-04-05"
      number: 2025
    isa:
      total_allowance_gbp: 20000
    dividend_tax:
      allowance_gbp: 500
      basic_rate_pct: 0.0875       # pre 2026/27 rates
      higher_rate_pct: 0.3375
      additional_rate_pct: 0.3935

disclaimers:
  primary: |
    These tax rule values are for informational use within Ruflo Wealth OS.
    UK tax law changes frequently. Verify against gov.uk before acting.
    This is decision-support software, not regulated financial or tax advice.
    For personalised advice, consult an FCA-authorised adviser or chartered
    accountant.
