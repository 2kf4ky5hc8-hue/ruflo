<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Atlas — Neo Spaces</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d222c;
      --border: #262b36;
      --text: #e7eaf0;
      --muted: #9aa3b2;
      --accent: #6aa6ff;
      --accent-2: #4f86d6;
      --danger: #e07070;
      --good: #6cc28b;
      --warn: #e0c070;
      --shadow: 0 6px 20px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; }
    a { color: var(--accent); }

    /* Layout */
    header.top {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
      position: sticky; top: 0; z-index: 5;
    }
    .top h1 { font-size: 16px; margin: 0; letter-spacing: .2px; }
    .top .spacer { flex: 1; }
    .top .who { color: var(--muted); font-size: 12px; }
    .top button, .top select {
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px;
    }
    .top button.primary { background: var(--accent); color: #0b1220; border-color: var(--accent); font-weight: 600; }
    .top button.primary:hover { background: var(--accent-2); }
    .top label { display: inline-flex; gap: 6px; align-items: center; color: var(--muted); font-size: 12px; }

    main.board {
      display: grid; gap: 12px; padding: 12px;
      grid-template-columns: repeat(6, minmax(240px, 1fr));
      overflow-x: auto; min-height: calc(100vh - 56px);
    }
    @media (max-width: 1200px) {
      main.board { grid-template-columns: repeat(3, minmax(260px, 1fr)); }
    }
    @media (max-width: 700px) {
      main.board { grid-template-columns: 1fr; }
    }

    .col {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      display: flex; flex-direction: column; min-height: 200px;
    }
    .col header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
    }
    .col header h2 { font-size: 13px; margin: 0; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
    .col header .count { margin-left: auto; color: var(--muted); font-size: 12px; }
    .col .cards { padding: 8px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .col.drop-target { outline: 2px dashed var(--accent); outline-offset: -6px; }

    .card {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; cursor: grab; user-select: none;
    }
    .card:active { cursor: grabbing; }
    .card h3 { margin: 0 0 4px; font-size: 14px; }
    .card .meta { display: flex; flex-wrap: wrap; gap: 6px 10px; color: var(--muted); font-size: 12px; }
    .card .meta .amount { color: var(--warn); }
    .card .meta .amount.zero { color: var(--good); }
    .card .meta .who { color: var(--accent); }
    .card .next { margin-top: 6px; font-size: 12px; color: var(--text); opacity: .9; }
    .card .stamp { margin-top: 6px; font-size: 11px; color: var(--muted); }

    /* Auth screen */
    .auth-wrap { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
    .auth-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 22px; width: 100%; max-width: 380px; box-shadow: var(--shadow); }
    .auth-card h1 { margin: 0 0 4px; font-size: 18px; }
    .auth-card p { color: var(--muted); margin: 0 0 14px; font-size: 13px; }
    .auth-card input { width: 100%; padding: 10px 12px; border-radius: 8px; background: var(--panel-2); border: 1px solid var(--border); }
    .auth-card button { width: 100%; padding: 10px 12px; margin-top: 10px; border-radius: 8px; background: var(--accent); color: #0b1220; border: none; font-weight: 600; }
    .auth-card .msg { margin-top: 10px; font-size: 13px; color: var(--good); }
    .auth-card .msg.err { color: var(--danger); }

    /* Setup screen (when CONFIG missing) */
    .setup { max-width: 720px; margin: 40px auto; padding: 24px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; }
    .setup pre { background: #0a0d12; padding: 12px; border-radius: 8px; overflow: auto; font-size: 12px; }
    .setup code { background: #0a0d12; padding: 2px 4px; border-radius: 4px; }

    /* Modal */
    .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: grid; place-items: center; padding: 16px; z-index: 50; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 520px; box-shadow: var(--shadow); }
    .modal header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
    .modal header h2 { margin: 0; font-size: 16px; }
    .modal header .close { margin-left: auto; background: transparent; border: none; color: var(--muted); font-size: 18px; }
    .modal .body { padding: 14px 16px; display: grid; gap: 10px; }
    .modal .row { display: grid; gap: 4px; }
    .modal .row label { font-size: 12px; color: var(--muted); }
    .modal input, .modal select, .modal textarea {
      width: 100%; padding: 9px 10px; border-radius: 8px;
      background: var(--panel-2); border: 1px solid var(--border);
    }
    .modal textarea { min-height: 80px; resize: vertical; }
    .modal .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .modal footer .spacer { flex: 1; }
    .modal footer button { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); }
    .modal footer button.primary { background: var(--accent); color: #0b1220; border-color: var(--accent); font-weight: 600; }
    .modal footer button.danger { background: transparent; color: var(--danger); border-color: transparent; }

    .empty { color: var(--muted); font-size: 12px; padding: 10px 4px; text-align: center; }
    .status-pill { font-size: 11px; padding: 2px 6px; border-radius: 999px; background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
    .status-pill.live { color: var(--good); border-color: rgba(108,194,139,.4); }
    .status-pill.off { color: var(--danger); border-color: rgba(224,112,112,.4); }

    /* Summary bar */
    .summary {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    .summary .sum-money { display: flex; align-items: baseline; gap: 8px; }
    .summary .sum-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .6px; }
    .summary .sum-value { font-size: 18px; font-weight: 700; color: var(--warn); }
    .summary .sum-sub { color: var(--muted); font-size: 12px; }
    .summary .sum-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
    .summary .sum-pill { font-size: 12px; color: var(--muted); background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 3px 9px; }
    .summary .sum-pill b { color: var(--text); }

    /* Payment status + invoice on cards */
    .card .pay { font-size: 11px; padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel); color: var(--muted); }
    .card .pay-not-invoiced { color: var(--muted); }
    .card .pay-deposit-due { color: var(--warn); border-color: rgba(224,192,112,.4); }
    .card .pay-in-progress { color: var(--accent); border-color: rgba(106,166,255,.4); }
    .card .pay-awaiting-payment { color: var(--danger); border-color: rgba(224,112,112,.4); }
    .card .pay-paid { color: var(--good); border-color: rgba(108,194,139,.4); }
    .card .inv { font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ─── CONFIG ────────────────────────────────────────────────────────────────
    // Paste your Supabase project keys here. The anon key is safe in client-side
    // code (RLS protects the data). Do NOT paste the service_role key or DB
    // password into this file.
    const CONFIG = {
      SUPABASE_URL: '',
      SUPABASE_ANON: '',
      STAGES: ['Lead', 'Quoted', 'Live', 'Snagging', 'Awaiting Payment', 'Complete'],
      TEAM: ['James', 'Richard', 'Olds', 'Riversdale'],
      PAYMENT_STATUSES: ['Not invoiced', 'Deposit due', 'In progress', 'Awaiting payment', 'Paid']
    };
    // ──────────────────────────────────────────────────────────────────────────

    const root = document.getElementById('root');

    if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON) {
      renderSetup();
    } else {
      const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON);
      boot(supabase);
    }

    function renderSetup() {
      root.innerHTML = `
        <div class="setup">
          <h1>Atlas — setup needed</h1>
          <p>Open <code>atlas/index.html</code> and paste your Supabase project URL and anon key into the <code>CONFIG</code> block near the top of the file.</p>
          <ol>
            <li>Create a Supabase project (region: London / EU West).</li>
            <li>SQL Editor → run <code>atlas/schema.sql</code>.</li>
            <li>Settings → API → copy <b>Project URL</b> and <b>anon public</b> key into <code>CONFIG</code>.</li>
            <li>Authentication → URL Configuration → set <b>Site URL</b> and add a <b>Redirect URL</b> matching your deploy URL.</li>
            <li>Deploy this folder to Cloudflare Pages (rename <code>index.html</code> stays the same; drag-drop the <code>atlas/</code> folder, or use <code>wrangler pages deploy atlas</code>).</li>
          </ol>
          <p>The schema you need to run:</p>
          <pre>create table if not exists jobs (
  id uuid primary key default gen_random_uuid(),
  name text not null,
  address text default '',
  assigned_to text default '',
  stage text not null default 'Lead',
  next_action text default '',
  amount_outstanding numeric default 0,
  payment_status text default 'Not invoiced',
  invoice_ref text default '',
  notes text default '',
  archived boolean not null default false,
  created_at timestamptz not null default now(),
  updated_at timestamptz not null default now(),
  updated_by text default ''
);
alter table jobs enable row level security;
create policy "team access" on jobs for all to authenticated using (true) with check (true);
alter publication supabase_realtime add table jobs;</pre>
        </div>`;
    }

    async function boot(supabase) {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return renderAuth(supabase);
      renderApp(supabase, session);
    }

    function renderAuth(supabase) {
      root.innerHTML = `
        <div class="auth-wrap">
          <div class="auth-card">
            <h1>Atlas</h1>
            <p>Sign in with your work email. We'll send you a one-tap login link.</p>
            <input id="email" type="email" placeholder="you@neospaces.co.uk" autocomplete="email" />
            <button id="send">Send sign-in link</button>
            <div id="msg" class="msg" hidden></div>
          </div>
        </div>`;
      const email = root.querySelector('#email');
      const btn = root.querySelector('#send');
      const msg = root.querySelector('#msg');
      btn.onclick = async () => {
        const e = (email.value || '').trim();
        if (!e) return;
        btn.disabled = true; btn.textContent = 'Sending…';
        const { error } = await supabase.auth.signInWithOtp({
          email: e,
          options: { emailRedirectTo: window.location.origin + window.location.pathname }
        });
        btn.disabled = false; btn.textContent = 'Send sign-in link';
        msg.hidden = false;
        if (error) { msg.classList.add('err'); msg.textContent = error.message; }
        else { msg.classList.remove('err'); msg.textContent = 'Check your email for the sign-in link.'; }
      };
      // If user lands back here with magic-link tokens, supabase-js handles it; re-check.
      supabase.auth.onAuthStateChange((_evt, session) => {
        if (session) renderApp(supabase, session);
      });
    }

    function renderApp(supabase, session) {
      const user = session.user;
      const me = user.email || 'unknown';

      let state = {
        jobs: [],
        showArchived: false,
        editing: null, // job object or 'new'
        live: false
      };

      root.innerHTML = `
        <header class="top">
          <h1>Atlas</h1>
          <span id="livePill" class="status-pill">connecting…</span>
          <span class="spacer"></span>
          <label><input type="checkbox" id="showArchived" /> Show archived</label>
          <button id="addBtn" class="primary">+ Add job</button>
          <span class="who" id="who"></span>
          <button id="signOut">Sign out</button>
        </header>
        <div class="summary" id="summary"></div>
        <main class="board" id="board"></main>
      `;

      const els = {
        board: root.querySelector('#board'),
        summary: root.querySelector('#summary'),
        livePill: root.querySelector('#livePill'),
        showArchived: root.querySelector('#showArchived'),
        addBtn: root.querySelector('#addBtn'),
        who: root.querySelector('#who'),
        signOut: root.querySelector('#signOut')
      };

      els.who.textContent = me;
      els.signOut.onclick = async () => { await supabase.auth.signOut(); location.reload(); };
      els.addBtn.onclick = () => openEditor('new');
      els.showArchived.onchange = () => { state.showArchived = els.showArchived.checked; renderBoard(); };

      drawColumns();
      loadJobs();
      subscribeRealtime();
      window.addEventListener('focus', loadJobs);

      function drawColumns() {
        els.board.innerHTML = CONFIG.STAGES.map(stage => `
          <section class="col" data-stage="${esc(stage)}">
            <header>
              <h2>${esc(stage)}</h2>
              <span class="count" data-count></span>
            </header>
            <div class="cards" data-drop></div>
          </section>
        `).join('');

        // Drag/drop wiring
        els.board.querySelectorAll('.col').forEach(col => {
          col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drop-target'); });
          col.addEventListener('dragleave', () => col.classList.remove('drop-target'));
          col.addEventListener('drop', async e => {
            e.preventDefault();
            col.classList.remove('drop-target');
            const id = e.dataTransfer.getData('text/plain');
            const newStage = col.dataset.stage;
            const job = state.jobs.find(j => j.id === id);
            if (!job || job.stage === newStage) return;
            await updateJob(id, { stage: newStage });
          });
        });
      }

      function renderBoard() {
        const buckets = Object.fromEntries(CONFIG.STAGES.map(s => [s, []]));
        for (const j of state.jobs) {
          if (j.archived && !state.showArchived) continue;
          if (!buckets[j.stage]) buckets[j.stage] = []; // resilience if a stage was renamed
          buckets[j.stage].push(j);
        }
        renderSummary(buckets);
        for (const stage of CONFIG.STAGES) {
          const col = els.board.querySelector(`.col[data-stage="${cssEsc(stage)}"]`);
          if (!col) continue;
          const list = col.querySelector('[data-drop]');
          const items = buckets[stage].sort(byUpdatedDesc);
          col.querySelector('[data-count]').textContent = items.length;
          if (!items.length) {
            list.innerHTML = `<div class="empty">No jobs</div>`;
            continue;
          }
          list.innerHTML = items.map(cardHtml).join('');
          list.querySelectorAll('.card').forEach(el => {
            el.draggable = true;
            el.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', el.dataset.id));
            el.addEventListener('click', () => {
              const job = state.jobs.find(j => j.id === el.dataset.id);
              if (job) openEditor(job);
            });
          });
        }
      }

      function renderSummary(buckets) {
        let totalOutstanding = 0;
        let totalJobs = 0;
        for (const stage of CONFIG.STAGES) {
          for (const j of buckets[stage]) {
            totalOutstanding += Number(j.amount_outstanding || 0);
            totalJobs += 1;
          }
        }
        const pills = CONFIG.STAGES
          .map(stage => `<span class="sum-pill">${esc(stage)} <b>${buckets[stage].length}</b></span>`)
          .join('');
        els.summary.innerHTML = `
          <div class="sum-money">
            <span class="sum-label">Outstanding</span>
            <span class="sum-value">£${totalOutstanding.toLocaleString('en-GB')}</span>
            <span class="sum-sub">across ${totalJobs} job${totalJobs === 1 ? '' : 's'}</span>
          </div>
          <div class="sum-pills">${pills}</div>`;
      }

      function cardHtml(j) {
        const amount = Number(j.amount_outstanding || 0);
        const amountClass = amount > 0 ? 'amount' : 'amount zero';
        const amountText = amount > 0 ? `£${amount.toLocaleString('en-GB')}` : 'Paid';
        const archived = j.archived ? ' · archived' : '';
        const status = j.payment_status || 'Not invoiced';
        const statusSlug = status.toLowerCase().replace(/[^a-z]+/g, '-');
        return `
          <article class="card" data-id="${esc(j.id)}">
            <h3>${esc(j.name)}</h3>
            <div class="meta">
              ${j.address ? `<span>${esc(j.address)}</span>` : ''}
              ${j.assigned_to ? `<span class="who">${esc(j.assigned_to)}</span>` : ''}
              <span class="${amountClass}">${amountText}</span>
            </div>
            <div class="meta">
              <span class="pay pay-${statusSlug}">${esc(status)}</span>
              ${j.invoice_ref ? `<span class="inv">#${esc(j.invoice_ref)}</span>` : ''}
            </div>
            ${j.next_action ? `<div class="next">→ ${esc(j.next_action)}</div>` : ''}
            <div class="stamp">${formatStamp(j.updated_at, j.updated_by)}${archived}</div>
          </article>`;
      }

      async function loadJobs() {
        const { data, error } = await supabase
          .from('jobs')
          .select('*')
          .order('updated_at', { ascending: false });
        if (error) { console.error(error); return; }
        state.jobs = data || [];
        renderBoard();
      }

      function subscribeRealtime() {
        const channel = supabase
          .channel('jobs-board')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'jobs' }, payload => {
            const row = payload.new || payload.old;
            if (!row) return;
            if (payload.eventType === 'DELETE') {
              state.jobs = state.jobs.filter(j => j.id !== row.id);
            } else {
              const i = state.jobs.findIndex(j => j.id === row.id);
              if (i >= 0) state.jobs[i] = payload.new;
              else state.jobs.unshift(payload.new);
            }
            renderBoard();
          })
          .subscribe(status => {
            const live = status === 'SUBSCRIBED';
            els.livePill.textContent = live ? 'live' : status.toLowerCase();
            els.livePill.classList.toggle('live', live);
            els.livePill.classList.toggle('off', !live);
            state.live = live;
          });
      }

      // ─── Editor modal ──────────────────────────────────────────────────────
      function openEditor(target) {
        const isNew = target === 'new';
        const j = isNew ? {
          name: '', address: '', assigned_to: '', stage: 'Lead',
          next_action: '', amount_outstanding: 0, payment_status: 'Not invoiced',
          invoice_ref: '', notes: '', archived: false
        } : { ...target };

        const back = document.createElement('div');
        back.className = 'modal-back';
        back.innerHTML = `
          <div class="modal" role="dialog" aria-label="Edit job">
            <header>
              <h2>${isNew ? 'New job' : 'Edit job'}</h2>
              <button class="close" aria-label="Close">×</button>
            </header>
            <div class="body">
              <div class="row"><label>Name</label><input id="f-name" value="${esc(j.name)}" /></div>
              <div class="row"><label>Address</label><input id="f-address" value="${esc(j.address)}" /></div>
              <div class="two">
                <div class="row">
                  <label>Stage</label>
                  <select id="f-stage">
                    ${CONFIG.STAGES.map(s => `<option ${s === j.stage ? 'selected' : ''}>${esc(s)}</option>`).join('')}
                  </select>
                </div>
                <div class="row">
                  <label>Assigned to</label>
                  <select id="f-assigned">
                    <option value=""></option>
                    ${CONFIG.TEAM.map(t => `<option ${t === j.assigned_to ? 'selected' : ''}>${esc(t)}</option>`).join('')}
                  </select>
                </div>
              </div>
              <div class="row"><label>Next action</label><input id="f-next" value="${esc(j.next_action)}" /></div>
              <div class="two">
                <div class="row"><label>Amount outstanding (£)</label><input id="f-amount" type="number" step="0.01" value="${Number(j.amount_outstanding || 0)}" /></div>
                <div class="row">
                  <label>Payment status</label>
                  <select id="f-payment">
                    ${CONFIG.PAYMENT_STATUSES.map(s => `<option ${s === (j.payment_status || 'Not invoiced') ? 'selected' : ''}>${esc(s)}</option>`).join('')}
                  </select>
                </div>
              </div>
              <div class="row"><label>Invoice ref / link</label><input id="f-invoice" value="${esc(j.invoice_ref)}" placeholder="e.g. INV-1042 or a URL" /></div>
              <div class="row"><label>Notes</label><textarea id="f-notes">${esc(j.notes)}</textarea></div>
            </div>
            <footer>
              ${!isNew ? `<button class="danger" id="f-archive">${j.archived ? 'Unarchive' : 'Archive'}</button>` : ''}
              <span class="spacer"></span>
              <button id="f-cancel">Cancel</button>
              <button class="primary" id="f-save">${isNew ? 'Create' : 'Save'}</button>
            </footer>
          </div>`;
        document.body.appendChild(back);

        const close = () => back.remove();
        back.querySelector('.close').onclick = close;
        back.querySelector('#f-cancel').onclick = close;
        back.addEventListener('click', e => { if (e.target === back) close(); });

        if (!isNew) {
          back.querySelector('#f-archive').onclick = async () => {
            await updateJob(j.id, { archived: !j.archived });
            close();
          };
        }

        back.querySelector('#f-save').onclick = async () => {
          const payload = {
            name: back.querySelector('#f-name').value.trim(),
            address: back.querySelector('#f-address').value.trim(),
            stage: back.querySelector('#f-stage').value,
            assigned_to: back.querySelector('#f-assigned').value,
            next_action: back.querySelector('#f-next').value.trim(),
            amount_outstanding: Number(back.querySelector('#f-amount').value || 0),
            payment_status: back.querySelector('#f-payment').value,
            invoice_ref: back.querySelector('#f-invoice').value.trim(),
            notes: back.querySelector('#f-notes').value,
            updated_at: new Date().toISOString(),
            updated_by: me
          };
          if (!payload.name) { alert('Name is required'); return; }
          if (isNew) {
            const { error } = await supabase.from('jobs').insert(payload);
            if (error) return alert(error.message);
          } else {
            const { error } = await supabase.from('jobs').update(payload).eq('id', j.id);
            if (error) return alert(error.message);
          }
          close();
        };

        setTimeout(() => back.querySelector('#f-name').focus(), 0);
      }

      async function updateJob(id, patch) {
        const payload = { ...patch, updated_at: new Date().toISOString(), updated_by: me };
        const { error } = await supabase.from('jobs').update(payload).eq('id', id);
        if (error) alert(error.message);
      }
    }

    // ─── Helpers ───────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
    function cssEsc(s) { return String(s).replace(/"/g, '\\"'); }
    function byUpdatedDesc(a, b) { return (b.updated_at || '').localeCompare(a.updated_at || ''); }
    function formatStamp(iso, who) {
      if (!iso) return '';
      const d = new Date(iso);
      const date = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
      const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      return `${date} ${time}${who ? ` · ${who}` : ''}`;
    }
  </script>
</body>
</html>
